<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Course Organizer - Add Course</title>
</head>

<body id="add-page">

    <div class="header">
        <h1>Course Organizer</h1>
        <p>Add a New Course</p>
    </div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="mycourse.html">My Courses</a>
        <a href="add.html">Add Course</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="container clearfix">
        <h2>Register New Class</h2>

        <form action="#" method="get">
            <div class="form-group">
                <label class="form-label">Course Name:</label>
                <input type="text" class="form-input" placeholder="e.g. Physics 101">
            </div>

            <div class="form-group">
                <label class="form-label">Course Code:</label>
                <input type="text" class="form-input" placeholder="e.g. PHY101">
            </div>

            <div class="form-group">
                <label class="form-label">Instructor:</label>
                <input type="text" class="form-input" placeholder="Instructor Name">
            </div>

            <div class="form-group">
                <label class="form-label">Credits:</label>
                <select class="form-input">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>
            </div>

            <button type="submit" class="btn">Save Course</button>
        </form>
    </div>

    <div class="footer">
        <p>A simple student project &copy; 2026</p>
    </div>

</body>

</html>
